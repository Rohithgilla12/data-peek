name: Build Artifacts

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - mac
          - windows
          - linux

jobs:
  # Gate every manual artifact build behind tests + typecheck. No more
  # shipping a bad dep split into an artifact that ends up on someone's
  # machine.
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: pnpm/action-setup@v6
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @data-peek/desktop test
      - run: pnpm --filter @data-peek/desktop typecheck

  build-mac:
    needs: verify
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'mac' }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for macOS
        working-directory: apps/desktop
        run: |
          pnpm exec electron-vite build
          pnpm exec electron-builder --mac --publish never

      - name: Verify native module architectures in DMGs
        working-directory: apps/desktop/dist
        run: |
          set -euxo pipefail
          for dmg in *.dmg; do
            expected_arch=$(echo "$dmg" | grep -oE 'arm64|x64')
            if [ -z "$expected_arch" ]; then
              echo "Skipping $dmg (no arch in name)"
              continue
            fi
            mount=$(mktemp -d)
            hdiutil attach "$dmg" -mountpoint "$mount" -nobrowse -readonly
            app=$(find "$mount" -maxdepth 2 -name '*.app' | head -1)
            while IFS= read -r node; do
              info=$(file "$node")
              case "$expected_arch" in
                x64)   needle="x86_64" ;;
                arm64) needle="arm64"  ;;
              esac
              if ! echo "$info" | grep -q "$needle"; then
                echo "ARCH MISMATCH in $dmg: $node -> $info"
                hdiutil detach "$mount" || true
                exit 1
              fi
            done < <(find "$app" -name '*.node')
            hdiutil detach "$mount"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: data-peek-mac
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.zip
          if-no-files-found: error

  build-windows:
    needs: verify
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for Windows
        working-directory: apps/desktop
        run: |
          pnpm exec electron-vite build
          pnpm exec electron-builder --win --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: data-peek-windows
          path: |
            apps/desktop/dist/*.exe
          if-no-files-found: error

  build-linux:
    needs: verify
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for Linux
        working-directory: apps/desktop
        run: |
          pnpm exec electron-vite build
          pnpm exec electron-builder --linux --publish never

      - name: Build deb package
        working-directory: apps/desktop
        run: pnpm exec electron-builder --linux deb --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: data-peek-linux
          path: |
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.deb
          if-no-files-found: error
